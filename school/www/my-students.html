---
no_cache: 1
title: My Students | Teacher Portal
---

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Students</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f6f9;
            --surface: #e2e8f0;
            --surface2: #cbd5e1;
            --border: rgba(0, 0, 0, 0.07);
            --text: #1e40af;
            --text2: #3b82f6;
            --text3: #64748b;
            --blue: #3b82f6;
            --indigo: #6366f1;
            --violet: #8b5cf6;
            --radius: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 28px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .title span {
            width: 5px;
            height: 24px;
            background: linear-gradient(180deg, var(--indigo), var(--blue));
            border-radius: 3px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--surface2);
            transform: translateX(-4px);
        }

        .table-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .table-head {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            background: #fafbfc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-title {
            font-size: 16px;
            font-weight: 700;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 8px 16px 8px 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            outline: none;
            font-family: inherit;
            width: 240px;
            transition: all 0.2s;
        }

        .search-box input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.5;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            background: #f8fafc;
            color: var(--text3);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
        }

        .data-table td {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
            font-size: 14px;
            vertical-align: middle;
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name-wrapper {
            display: flex;
            flex-direction: column;
        }

        .name {
            font-weight: 600;
            color: var(--text);
        }

        .reg-no {
            font-size: 12px;
            color: var(--text3);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.1);
            color: var(--indigo);
        }

        .state-msg {
            text-align: center;
            padding: 40px;
            color: var(--text3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .table-card { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title"><span></span>My Students</h1>
            <a href="/assets/school/html/teacher-portal.html" class="back-btn">← Back to Dashboard</a>
        </header>

        <div class="table-card">
            <div class="table-head">
                <div class="table-title">Student Directory</div>
                <div class="search-box">
                    <input type="text" id="student-search" placeholder="Search students..." onkeyup="filterTable()">
                </div>
            </div>
            <div class="table-body">
                <table class="data-table" id="student-table">
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Class</th>
                            <th>Section</th>
                            <th>Reg Number</th>
                        </tr>
                    </thead>
                    <tbody id="student-list">
                        <tr><td colspan="4" class="state-msg">Loading students...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function filterTable() {
            const input = document.getElementById('student-search');
            const filter = input.value.toUpperCase();
            const table = document.getElementById('student-table');
            const tr = table.getElementsByTagName('tr');

            for (let i = 1; i < tr.length; i++) {
                let found = false;
                const td = tr[i].getElementsByTagName('td');
                for (let j = 0; j < td.length; j++) {
                    if (td[j].textContent.toUpperCase().indexOf(filter) > -1) {
                        found = true;
                        break;
                    }
                }
                tr[i].style.display = found ? "" : "none";
            }
        }

        window.addEventListener('load', function() {
            fetch('/api/method/school.api.get_teacher_students_list')
                .then(r => r.json())
                .then(r => {
                    const tbody = document.getElementById('student-list');
                    if (r.message && r.message.length) {
                        let html = '';
                        r.message.forEach(s => {
                            const initials = s.full_name.charAt(0).toUpperCase();
                            const avatar = s.student_image 
                                ? `<img src="${s.student_image}" alt="${s.full_name}">`
                                : initials;
                            
                            html += `
                                <tr>
                                    <td>
                                        <div class="student-info">
                                            <div class="avatar">${avatar}</div>
                                            <div class="name-wrapper">
                                                <span class="name">${s.full_name}</span>
                                                <span class="reg-no">${s.name}</span>
                                            </div>
                                        </div>
                                    </td>
                                    <td><span class="badge">${s.class_label || s.student_class}</span></td>
                                    <td>${s.section || '—'}</td>
                                    <td><code>${s.student_reg_no || '—'}</code></td>
                                </tr>
                            `;
                        });
                        tbody.innerHTML = html;
                    } else {
                        tbody.innerHTML = '<tr><td colspan="4" class="state-msg">No students found.</td></tr>';
                    }
                })
                .catch(err => {
                    document.getElementById('student-list').innerHTML = 
                        '<tr><td colspan="4" class="state-msg" style="color:red">Error loading data.</td></tr>';
                });
        });
    </script>
</body>
</html>
