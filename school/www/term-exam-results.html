<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Term Exam Results | Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff; padding: 1.75rem 1.25rem;
            box-shadow: 0 4px 12px rgba(79,70,229,0.3);
        }
        .header-inner {
            max-width: 860px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 { font-size: 1.6rem; font-weight: 700; }
        .btn-back {
            background: rgba(255,255,255,0.2); color: #fff;
            padding: 0.45rem 1rem; border-radius: 8px;
            text-decoration: none; font-size: 0.875rem; font-weight: 500;
            transition: background 0.2s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.3); color: #fff; text-decoration: none; }

        /* Main */
        .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.25rem; }

        /* Student banner */
        .student-banner {
            background: var(--card); border-radius: 12px;
            border: 1px solid var(--border);
            padding: 1.25rem 1.5rem; margin-bottom: 2rem;
            display: flex; align-items: center; gap: 1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .avatar {
            width: 50px; height: 50px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: 700;
        }
        .student-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.2rem; }
        .student-info p  { font-size: 0.85rem; color: var(--muted); }

        /* State boxes */
        .state {
            background: var(--card); border-radius: 12px;
            border: 1px solid var(--border);
            padding: 3rem 2rem; text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            color: var(--muted);
        }
        .state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .state p { font-size: 1rem; }
        .spinner {
            width: 32px; height: 32px; border-radius: 50%;
            border: 3px solid #e2e8f0; border-top-color: var(--primary);
            animation: spin 0.7s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Result cards */
        .result-card {
            background: var(--card); border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 1.75rem; overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff; padding: 1.1rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .card-header h3 { font-size: 1rem; font-weight: 600; margin: 0; }
        .card-header span { font-size: 0.82rem; opacity: 0.85; }

        .card-summary {
            display: flex; gap: 0.75rem; flex-wrap: wrap;
            padding: 1rem 1.5rem; background: #fafbff;
            border-bottom: 1px solid var(--border);
        }
        .badge {
            background: #f1f5f9; border: 1px solid var(--border);
            border-radius: 8px; padding: 0.45rem 0.9rem;
        }
        .badge strong { display: block; font-size: 1rem; font-weight: 700; color: var(--primary); }
        .badge small  { font-size: 0.72rem; color: var(--muted); }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.8rem 1.25rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
        th { background: #f8fafc; font-weight: 600; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }

        .bar-wrap { display: flex; align-items: center; gap: 0.5rem; }
        .bar-num  { min-width: 42px; font-size: 0.82rem; color: var(--muted); }
        .bar-track { flex: 1; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .bar-fill  { height: 100%; border-radius: 3px; }

        .pill { display: inline-block; border-radius: 999px; padding: 0.15rem 0.6rem; font-size: 0.75rem; font-weight: 700; }
        .g-a { background: #dcfce7; color: #166534; }
        .g-b { background: #dbeafe; color: #1e40af; }
        .g-c { background: #fef9c3; color: #854d0e; }
        .g-d { background: #ffedd5; color: #9a3412; }
        .g-f { background: #fee2e2; color: #991b1b; }

        .spill { display: inline-block; border-radius: 6px; padding: 0.15rem 0.55rem; font-size: 0.75rem; font-weight: 600; }
        .s-pass     { background: #dcfce7; color: #166534; }
        .s-moderate { background: #fef9c3; color: #854d0e; }
        .s-failed   { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-inner">
        <h1>📋 Term Exam Results</h1>
        <a href="/assets/school/html/student-portal.html" class="btn-back">← Back to Portal</a>
    </div>
</div>

<div class="main">
    <div class="student-banner" id="student-banner" style="display:none;">
        <div class="avatar" id="student-avatar">S</div>
        <div class="student-info">
            <h3 id="student-name">—</h3>
            <p id="student-meta">—</p>
        </div>
    </div>

    <div class="state" id="state-loading">
        <div class="spinner"></div>
        <p>Loading your exam results…</p>
    </div>

    <div class="state" id="state-empty" style="display:none;">
        <div class="icon">🔍</div>
        <p>No submitted exam results found for your account.</p>
    </div>

    <div class="state" id="state-error" style="display:none;">
        <div class="icon">⚠️</div>
        <p id="error-msg">Something went wrong.</p>
    </div>

    <div id="cards-container"></div>
</div>

<script>
function getCsrf() {
    var m = document.cookie.match(/csrf_token=([^;]+)/);
    return m ? decodeURIComponent(m[1]) : '';
}
function apiFetch(path) {
    return fetch(path, {
        credentials: 'include',
        headers: { 'Accept': 'application/json', 'X-Frappe-CSRF-Token': getCsrf() }
    }).then(function(r) { return r.json(); });
}
function el(id) { return document.getElementById(id); }
function hide(id) { el(id).style.display = 'none'; }
function show(id) { el(id).style.display = ''; }
function showError(msg) {
    hide('state-loading'); hide('state-empty');
    el('error-msg').textContent = msg;
    show('state-error');
}

var student = null;

window.addEventListener('load', function() {
    // Verify session
    apiFetch('/api/method/frappe.auth.get_logged_user')
        .then(function(d) {
            if (!d.message || d.message === 'Guest') {
                window.location.href = '/portal-login'; return;
            }
            loadStudent(d.message);
        })
        .catch(function() { showError('Session error. Please login again.'); });
});

function loadStudent(email) {
    var url = '/api/resource/Student?fields=["name","first_name","last_name","student_class","admission_number"]' +
              '&filters=[["portal_email","=","' + encodeURIComponent(email) + '"]]&limit=1';
    apiFetch(url).then(function(d) {
        if (!d.data || !d.data.length) {
            showError('No student record linked to your login. Please contact your administrator.');
            return;
        }
        student = d.data[0];
        renderBanner(student);
        loadReports(student);
    }).catch(function() { showError('Could not load student data.'); });
}

function renderBanner(s) {
    var name = ((s.first_name || '') + ' ' + (s.last_name || '')).trim() || s.name;
    el('student-avatar').textContent = name.charAt(0).toUpperCase();
    el('student-name').textContent  = name;
    var meta = [];
    if (s.admission_number) meta.push('Adm: ' + s.admission_number);
    if (s.student_class)    meta.push('Class: ' + s.student_class);
    el('student-meta').textContent = meta.join('  •  ') || s.name;
    el('student-banner').style.display = 'flex';
}

function loadReports(s) {
    // Fetch all submitted Term Exam Reports for this student's class
    var filters = '[["docstatus","=","1"]';
    if (s.student_class) filters += ',["student_class","=","' + s.student_class + '"]]';
    else filters += ']';

    var url = '/api/resource/Term Exam Report?fields=["name","report_name","term","academic_year","report_date","student_class"]' +
              '&filters=' + encodeURIComponent(filters) + '&order_by=report_date desc&limit=20';

    apiFetch(url).then(function(d) {
        if (!d.data || !d.data.length) {
            hide('state-loading'); show('state-empty'); return;
        }
        // Now load each full report doc to get child table
        var reports = d.data;
        var loaded  = [];
        var count   = 0;
        reports.forEach(function(meta) {
            apiFetch('/api/resource/Term Exam Report/' + encodeURIComponent(meta.name))
                .then(function(r) {
                    count++;
                    if (r.data) {
                        var doc  = r.data;
                        var rows = (doc.term_exam_results || []).filter(function(row) {
                            return row.student === student.name;
                        });
                        if (rows.length) loaded.push({ doc: doc, rows: rows });
                    }
                    if (count === reports.length) {
                        hide('state-loading');
                        if (!loaded.length) { show('state-empty'); return; }
                        loaded.forEach(function(item) { renderCard(item.doc, item.rows); });
                    }
                })
                .catch(function() { count++; });
        });
    }).catch(function() { showError('Could not load exam reports.'); });
}

function renderCard(doc, rows) {
    // Summary
    var totalObt = 0, totalMax = 0, passed = 0, failed = 0;
    rows.forEach(function(r) {
        totalObt += parseFloat(r.marks_obtained || 0);
        totalMax += parseFloat(r.max_marks || 0);
        var s = (r.status || '').toLowerCase();
        if (s === 'pass' || s === 'moderate') passed++;
        else if (s === 'failed') failed++;
    });
    var pct = totalMax > 0 ? ((totalObt / totalMax) * 100).toFixed(1) : null;

    var card = document.createElement('div');
    card.className = 'result-card';

    // Header
    var headerMeta = [];
    if (doc.academic_year) headerMeta.push(doc.academic_year);
    if (doc.report_date)   headerMeta.push(doc.report_date);
    card.innerHTML =
        '<div class="card-header">' +
            '<h3>📄 ' + (doc.term || doc.report_name || 'Term Report') + '</h3>' +
            '<span>' + headerMeta.join('  |  ') + '</span>' +
        '</div>';

    // Summary badges
    var summaryDiv = document.createElement('div');
    summaryDiv.className = 'card-summary';
    summaryDiv.innerHTML =
        badge(rows.length, 'Subjects') +
        badge(totalObt, 'Total Obtained') +
        (totalMax ? badge(totalMax, 'Total Max') : '') +
        (pct      ? badge(pct + '%', 'Overall %') : '') +
        (passed   ? badge(passed, 'Passed')  : '') +
        (failed   ? badge(failed, 'Failed')  : '');
    card.appendChild(summaryDiv);

    // Table
    var tableWrap = document.createElement('div');
    var tbodyRows = '';
    rows.forEach(function(row) {
        var obt   = parseFloat(row.marks_obtained || 0);
        var max   = parseFloat(row.max_marks || 0);
        var rowPct = row.percentage != null
                     ? parseFloat(row.percentage).toFixed(1)
                     : (max > 0 ? ((obt / max) * 100).toFixed(1) : '—');
        var grade  = (row.grade || autoGrade(parseFloat(rowPct))).toUpperCase();
        var color  = barColor(parseFloat(rowPct));
        var comments = [];
        if (row.remarks)         comments.push(row.remarks);
        if (row.teacher_comment) comments.push('Teacher: ' + row.teacher_comment);
        if (row.admin_comment)   comments.push('Admin: '   + row.admin_comment);

        tbodyRows +=
            '<tr>' +
            '<td><strong>' + (row.subject || '—') + '</strong></td>' +
            '<td>' + obt + '</td>' +
            '<td>' + (max || '—') + '</td>' +
            '<td><div class="bar-wrap"><span class="bar-num">' + rowPct + '%</span>' +
                '<div class="bar-track"><div class="bar-fill" style="width:' + Math.min(parseFloat(rowPct)||0,100) + '%;background:' + color + ';"></div></div>' +
            '</div></td>' +
            '<td><span class="pill ' + gradeClass(grade) + '">' + grade + '</span></td>' +
            '<td>' + statusPill(row.status) + '</td>' +
            '<td style="color:var(--muted);font-size:0.8rem;font-style:italic">' + (comments.join(' — ') || '—') + '</td>' +
            '</tr>';
    });

    tableWrap.innerHTML =
        '<table>' +
        '<thead><tr><th>Subject</th><th>Marks</th><th>Max</th><th>Percentage</th><th>Grade</th><th>Status</th><th>Remarks</th></tr></thead>' +
        '<tbody>' + tbodyRows + '</tbody>' +
        '</table>';
    card.appendChild(tableWrap);

    el('cards-container').appendChild(card);
}

/* Helpers */
function badge(v, l) {
    return '<div class="badge"><strong>' + v + '</strong><small>' + l + '</small></div>';
}
function barColor(p) {
    return p >= 80 ? '#4f46e5' : p >= 65 ? '#0891b2' : p >= 50 ? '#d97706' : '#dc2626';
}
function gradeClass(g) {
    if (g[0]==='A') return 'g-a'; if (g[0]==='B') return 'g-b';
    if (g[0]==='C') return 'g-c'; if (g[0]==='D') return 'g-d';
    return 'g-f';
}
function statusPill(s) {
    var l = (s || '').toLowerCase();
    if (l === 'pass')     return '<span class="spill s-pass">Pass ✓</span>';
    if (l === 'moderate') return '<span class="spill s-moderate">Moderate</span>';
    if (l === 'failed')   return '<span class="spill s-failed">Failed ✗</span>';
    return '<span style="color:var(--muted)">—</span>';
}
function autoGrade(p) {
    if (p>=80) return 'A'; if (p>=70) return 'B';
    if (p>=60) return 'C'; if (p>=50) return 'D'; return 'F';
}
</script>
</body>
</html>
