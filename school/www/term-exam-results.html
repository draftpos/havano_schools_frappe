<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Term Exam Results | Student Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
        }

        .portal-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            padding: 1.75rem 0;
            box-shadow: 0 4px 12px rgba(79,70,229,0.3);
        }
        .container { max-width: 960px; margin: 0 auto; padding: 0 1.25rem; }
        .header-row { display: flex; justify-content: space-between; align-items: center; }
        .header-row h1 { margin: 0; font-size: 1.75rem; font-weight: 700; }
        .btn-back {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: rgba(255,255,255,0.18); color: #fff;
            padding: 0.45rem 1rem; border-radius: 8px;
            text-decoration: none; font-size: 0.9rem; font-weight: 500;
            transition: background 0.2s;
        }
        .btn-back:hover { background: rgba(255,255,255,0.28); color: #fff; text-decoration: none; }

        .content { padding: 2rem 0; }

        .student-banner {
            background: var(--card-bg); border-radius: 12px;
            padding: 1.25rem 1.5rem; margin-bottom: 1.5rem;
            border: 1px solid var(--border);
            display: flex; align-items: center; gap: 1rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }
        .student-avatar {
            width: 52px; height: 52px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: 700; flex-shrink: 0;
        }
        .student-info h3 { margin: 0 0 0.2rem; font-size: 1rem; font-weight: 600; }
        .student-info p  { margin: 0; font-size: 0.85rem; color: var(--muted); }

        .filter-card {
            background: var(--card-bg); border-radius: 12px;
            padding: 1.5rem; margin-bottom: 1.5rem;
            border: 1px solid var(--border); box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }
        .filter-card label {
            display: block; font-weight: 600; font-size: 0.8rem;
            margin-bottom: 0.5rem; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .filter-card select {
            width: 100%; padding: 0.75rem 1rem;
            border-radius: 8px; border: 1.5px solid var(--border);
            font-size: 1rem; font-family: 'Inter', sans-serif;
            background: #f8fafc; color: var(--text);
            cursor: pointer; transition: border-color 0.2s;
        }
        .filter-card select:focus { outline: none; border-color: var(--primary); background: #fff; }

        .state-box {
            background: var(--card-bg); border-radius: 12px;
            padding: 3rem 2rem; text-align: center;
            border: 1px solid var(--border); box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            color: var(--muted);
        }
        .state-box .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .state-box p { margin: 0; font-size: 1rem; }

        .results-card {
            background: var(--card-bg); border-radius: 12px;
            border: 1px solid var(--border); box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .results-header {
            padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: #f8fafc;
        }
        .results-header h3 { margin: 0; font-size: 1rem; font-weight: 600; }
        .results-meta { font-size: 0.85rem; color: var(--muted); }

        .summary-row {
            display: flex; gap: 0.75rem; padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border); flex-wrap: wrap;
            background: #fafbff;
        }
        .sum-badge {
            background: #f1f5f9; border: 1px solid var(--border);
            border-radius: 8px; padding: 0.5rem 1rem;
        }
        .sum-badge strong { font-weight: 700; font-size: 1rem; color: var(--primary); display: block; }
        .sum-badge span { color: var(--muted); font-size: 0.75rem; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.85rem 1.25rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th {
            background: #f8fafc; font-weight: 600; color: var(--muted);
            font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }

        .pct-wrap { display: flex; align-items: center; gap: 0.5rem; }
        .pct-num { min-width: 44px; font-size: 0.85rem; color: var(--muted); }
        .bar-track { flex: 1; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; }

        .grade-pill { display: inline-block; padding: 0.18rem 0.65rem; border-radius: 999px; font-size: 0.78rem; font-weight: 700; }
        .g-a { background: #dcfce7; color: #166534; }
        .g-b { background: #dbeafe; color: #1e40af; }
        .g-c { background: #fef9c3; color: #854d0e; }
        .g-d { background: #ffedd5; color: #9a3412; }
        .g-f { background: #fee2e2; color: #991b1b; }

        .status-pill { display: inline-block; padding: 0.18rem 0.6rem; border-radius: 6px; font-size: 0.78rem; font-weight: 600; }
        .s-pass     { background: #dcfce7; color: #166534; }
        .s-moderate { background: #fef9c3; color: #854d0e; }
        .s-failed   { background: #fee2e2; color: #991b1b; }
        .comment-cell { color: var(--muted); font-size: 0.82rem; font-style: italic; }

        .spinner {
            border: 3px solid #e2e8f0; border-top-color: var(--primary);
            border-radius: 50%; width: 32px; height: 32px;
            animation: spin 0.7s linear infinite; margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="portal-header">
    <div class="container header-row">
        <h1>📋 Term Exam Results</h1>
        <a href="/assets/school/html/student-portal.html" class="btn-back">← Back to Portal</a>
    </div>
</div>

<div class="content">
    <div class="container">

        <div class="student-banner" id="student-banner" style="display:none;">
            <div class="student-avatar" id="student-avatar">S</div>
            <div class="student-info">
                <h3 id="student-name">—</h3>
                <p id="student-meta">—</p>
            </div>
        </div>

        <div class="filter-card">
            <label for="select-term">Select Academic Term</label>
            <select id="select-term">
                <option value="">— Choose a term —</option>
            </select>
        </div>

        <div class="state-box" id="state-loading" style="display:none;">
            <div class="spinner"></div>
            <p>Fetching your results…</p>
        </div>

        <div class="state-box" id="state-prompt">
            <div class="icon">📚</div>
            <p>Please select a term above to view your exam results.</p>
        </div>

        <div class="state-box" id="state-empty" style="display:none;">
            <div class="icon">🔍</div>
            <p>No submitted results found for this term.</p>
        </div>

        <div class="state-box" id="state-error" style="display:none;">
            <div class="icon">⚠️</div>
            <p id="error-msg">Something went wrong.</p>
        </div>

        <div class="results-card" id="results-card" style="display:none;">
            <div class="results-header">
                <h3 id="results-title">Results</h3>
                <span class="results-meta" id="results-meta"></span>
            </div>
            <div class="summary-row" id="summary-row"></div>
            <table>
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Marks</th>
                        <th>Max</th>
                        <th>Percentage</th>
                        <th>Grade</th>
                        <th>Status</th>
                        <th>Remarks / Comments</th>
                    </tr>
                </thead>
                <tbody id="results-body"></tbody>
            </table>
        </div>

    </div>
</div>

<script>
// ── Frappe REST API helper using fetch (no frappe global needed) ──
function getCsrf() {
    var match = document.cookie.match(/csrf_token=([^;]+)/);
    return match ? decodeURIComponent(match[1]) : '';
}

function apiGet(doctype, params) {
    var url = '/api/resource/' + encodeURIComponent(doctype) + '?' + params;
    return fetch(url, {
        credentials: 'include',
        headers: { 'Accept': 'application/json', 'X-Frappe-CSRF-Token': getCsrf() }
    }).then(function(r) { return r.json(); });
}

function apiGetDoc(doctype, name) {
    var url = '/api/resource/' + encodeURIComponent(doctype) + '/' + encodeURIComponent(name);
    return fetch(url, {
        credentials: 'include',
        headers: { 'Accept': 'application/json', 'X-Frappe-CSRF-Token': getCsrf() }
    }).then(function(r) { return r.json(); });
}

// ── UI Helpers ──
function hide() {
    var ids = ['state-loading','state-empty','state-error','state-prompt','results-card'];
    ids.forEach(function(id) { document.getElementById(id).style.display = 'none'; });
}
function show(id) { document.getElementById(id).style.display = ''; }
function showError(msg) { hide(); document.getElementById('error-msg').textContent = msg; show('state-error'); }
function el(id) { return document.getElementById(id); }

// ── State ──
var currentStudent = null;

// ── On page load ──
window.addEventListener('load', function() {

    // Check session via /api/method/frappe.auth.get_logged_user
    fetch('/api/method/frappe.auth.get_logged_user', { credentials: 'include' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var user = data.message;
            if (!user || user === 'Guest') {
                window.location.href = '/portal-login';
                return;
            }
            resolveStudent(user);
        })
        .catch(function() { showError('Could not verify your session. Please login again.'); });
});

// ── Step 1: Find Student by portal_email ──
function resolveStudent(userEmail) {
    apiGet('Student', 'fields=["name","first_name","last_name","student_class","admission_number"]&filters=[["portal_email","=","' + userEmail + '"]]&limit=1')
        .then(function(data) {
            if (!data.data || !data.data.length) {
                showError('No student record linked to your account. Please contact your administrator.');
                return;
            }
            currentStudent = data.data[0];
            renderBanner(currentStudent);
            loadTerms();
        })
        .catch(function() { showError('Failed to load student data.'); });
}

// ── Render student banner ──
function renderBanner(s) {
    var name = ((s.first_name || '') + ' ' + (s.last_name || '')).trim() || s.name;
    el('student-avatar').textContent = name.charAt(0).toUpperCase();
    el('student-name').textContent = name;
    var meta = [];
    if (s.admission_number) meta.push('Adm No: ' + s.admission_number);
    if (s.student_class)    meta.push('Class: ' + s.student_class);
    el('student-meta').textContent = meta.join('  •  ') || s.name;
    el('student-banner').style.display = 'flex';
}

// ── Step 2: Load terms from Term DocType ──
function loadTerms() {
    apiGet('Term', 'fields=["name","term_name"]&order_by=creation desc&limit=50')
        .then(function(data) {
            var sel = el('select-term');
            sel.innerHTML = '<option value="">— Choose a term —</option>';
            if (data.data && data.data.length) {
                data.data.forEach(function(t) {
                    var opt = document.createElement('option');
                    opt.value = t.name;
                    opt.textContent = t.term_name || t.name;
                    sel.appendChild(opt);
                });
            } else {
                var opt = document.createElement('option');
                opt.disabled = true;
                opt.textContent = 'No terms found';
                sel.appendChild(opt);
            }
        })
        .catch(function() { showError('Failed to load terms.'); });
}

// ── Step 3: On term select ──
el('select-term').addEventListener('change', function() {
    var term = this.value;
    if (!term || !currentStudent) return;
    hide();
    show('state-loading');
    fetchReport(term);
});

// ── Step 4: Fetch Term Exam Report ──
function fetchReport(term) {
    var filters = '[["term","=","' + term + '"],["docstatus","=","1"]';
    if (currentStudent.student_class) {
        filters += ',["student_class","=","' + currentStudent.student_class + '"]]';
    } else {
        filters += ']';
    }

    apiGet('Term Exam Report', 'fields=["name","report_name","term","academic_year","student_class","report_date"]&filters=' + encodeURIComponent(filters) + '&order_by=modified desc&limit=5')
        .then(function(data) {
            if (!data.data || !data.data.length) {
                hide(); show('state-empty'); return;
            }
            loadFullReport(data.data[0]);
        })
        .catch(function() { hide(); showError('Failed to fetch exam reports.'); });
}

// ── Step 5: Load full doc with child table ──
function loadFullReport(meta) {
    apiGetDoc('Term Exam Report', meta.name)
        .then(function(data) {
            hide();
            if (!data.data) { showError('Could not load the report details.'); return; }
            var doc = data.data;
            var allRows = doc.term_exam_results || [];
            var myRows = allRows.filter(function(row) {
                return row.student === currentStudent.name;
            });
            if (!myRows.length) { show('state-empty'); return; }
            renderResults(doc, myRows);
        })
        .catch(function() { hide(); showError('Failed to load report details.'); });
}

// ── Step 6: Render results ──
function renderResults(doc, rows) {
    el('results-title').textContent = (doc.term || '') + ' — Exam Results';
    var metaParts = [];
    if (doc.report_date)   metaParts.push(doc.report_date);
    if (doc.academic_year) metaParts.push(doc.academic_year);
    el('results-meta').textContent = metaParts.join('  |  ');

    var totalObt = 0, totalMax = 0, passCount = 0, failCount = 0;
    rows.forEach(function(r) {
        totalObt += parseFloat(r.marks_obtained || 0);
        totalMax += parseFloat(r.max_marks || 0);
        var s = (r.status || '').toLowerCase();
        if (s === 'pass' || s === 'moderate') passCount++;
        else if (s === 'failed') failCount++;
    });
    var overallPct = totalMax > 0 ? ((totalObt / totalMax) * 100).toFixed(1) : '—';

    var summaryHTML = sumBadge(rows.length, 'Subjects') +
        sumBadge(totalObt, 'Total Obtained');
    if (totalMax > 0) summaryHTML += sumBadge(totalMax, 'Total Max') + sumBadge(overallPct + '%', 'Overall %');
    if (passCount) summaryHTML += sumBadge(passCount, 'Passed');
    if (failCount) summaryHTML += sumBadge(failCount, 'Failed');
    el('summary-row').innerHTML = summaryHTML;

    var tbody = el('results-body');
    tbody.innerHTML = '';
    rows.forEach(function(row) {
        var obt  = parseFloat(row.marks_obtained || 0);
        var max  = parseFloat(row.max_marks || 0);
        var pct  = row.percentage != null
                   ? parseFloat(row.percentage).toFixed(1)
                   : (max > 0 ? ((obt / max) * 100).toFixed(1) : '—');
        var grade  = (row.grade || autoGrade(parseFloat(pct))).toString().toUpperCase();
        var color  = barColor(parseFloat(pct));
        var comments = [];
        if (row.remarks)         comments.push(row.remarks);
        if (row.teacher_comment) comments.push('Teacher: ' + row.teacher_comment);
        if (row.admin_comment)   comments.push('Admin: '   + row.admin_comment);

        var tr = document.createElement('tr');
        tr.innerHTML =
            '<td><strong>' + (row.subject || '—') + '</strong></td>' +
            '<td>' + obt + '</td>' +
            '<td>' + (max || '—') + '</td>' +
            '<td><div class="pct-wrap"><span class="pct-num">' + pct + '%</span>' +
                '<div class="bar-track"><div class="bar-fill" style="width:' + Math.min(parseFloat(pct)||0,100) + '%;background:' + color + ';"></div></div></div></td>' +
            '<td><span class="grade-pill ' + gradeClass(grade) + '">' + grade + '</span></td>' +
            '<td>' + statusPill(row.status) + '</td>' +
            '<td class="comment-cell">' + (comments.join(' — ') || '—') + '</td>';
        tbody.appendChild(tr);
    });

    show('results-card');
}

// ── Pure helpers ──
function sumBadge(v, l) { return '<div class="sum-badge"><strong>' + v + '</strong><span>' + l + '</span></div>'; }
function barColor(p) { return p >= 80 ? '#4f46e5' : p >= 65 ? '#0891b2' : p >= 50 ? '#d97706' : '#dc2626'; }
function gradeClass(g) {
    if (g.startsWith('A')) return 'g-a';
    if (g.startsWith('B')) return 'g-b';
    if (g.startsWith('C')) return 'g-c';
    if (g.startsWith('D')) return 'g-d';
    return 'g-f';
}
function statusPill(s) {
    var l = (s || '').toLowerCase();
    if (l === 'pass')     return '<span class="status-pill s-pass">Pass ✓</span>';
    if (l === 'moderate') return '<span class="status-pill s-moderate">Moderate</span>';
    if (l === 'failed')   return '<span class="status-pill s-failed">Failed ✗</span>';
    return '<span style="color:var(--muted)">—</span>';
}
function autoGrade(p) {
    if (p >= 80) return 'A'; if (p >= 70) return 'B';
    if (p >= 60) return 'C'; if (p >= 50) return 'D';
    return 'F';
}
</script>

</body>
</html>
