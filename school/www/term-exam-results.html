<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Term Exam Reports</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f6f9; --surface: #ffffff;
      --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.12);
      --text: #0f172a; --text2: #475569; --text3: #94a3b8;
      --blue: #3b82f6; --indigo: #6366f1; --emerald: #10b981;
      --amber: #f59e0b; --rose: #f43f5e; --violet: #8b5cf6;
      --sidebar-w: 272px; --header-h: 68px; --radius: 14px; --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0; width: var(--sidebar-w);
      height: 100vh; background: #fff; border-right: 1px solid var(--border2);
      display: flex; flex-direction: column; z-index: 100; transition: transform .3s; overflow-y: auto;
    }
    .sidebar-logo { padding: 22px 20px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-logo .logo-text { font-size: 18px; font-weight: 800; color: var(--indigo); }
    .sidebar-logo .logo-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .nav-section { padding: 16px 12px 8px; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      border-radius: var(--radius-sm); margin: 2px 8px; font-size: 14px;
      font-weight: 500; color: var(--text2); text-decoration: none; transition: all .15s;
    }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { background: rgba(99,102,241,0.1); color: var(--indigo); font-weight: 600; }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

    /* ── Main ── */
    .main { margin-left: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      height: var(--header-h); background: #fff; border-bottom: 1px solid var(--border2);
      display: flex; align-items: center; padding: 0 28px; gap: 16px;
      position: sticky; top: 0; z-index: 50;
    }
    .page-title { font-size: 18px; font-weight: 700; }
    .menu-toggle { display: none; background: none; border: none; font-size: 22px; cursor: pointer; }
    .content { padding: 28px; flex: 1; }

    /* ── Term Filter Bar ── */
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; align-items: center;
    }
    .filter-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-right: 4px; }
    .term-btn {
      padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border2);
      background: white; font-size: 13px; font-weight: 600; color: var(--text2);
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .term-btn:hover { border-color: var(--indigo); color: var(--indigo); }
    .term-btn.active { background: var(--indigo); color: white; border-color: var(--indigo); }

    /* ── Term Section ── */
    .term-section { margin-bottom: 36px; }
    .term-heading {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    }
    .term-heading h2 { font-size: 18px; font-weight: 700; }
    .term-pill {
      padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      background: rgba(99,102,241,0.1); color: var(--indigo);
    }

    /* ── Exam Block ── */
    .exam-block {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 16px;
    }
    .exam-block-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
      cursor: pointer; user-select: none;
    }
    .exam-block-header:hover { background: #fafbfc; }
    .exam-name { font-size: 15px; font-weight: 700; }
    .exam-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .exam-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .chevron { font-size: 14px; color: var(--text3); transition: transform .2s; }
    .exam-block.collapsed .chevron { transform: rotate(-90deg); }
    .exam-block-body { overflow: hidden; transition: max-height .3s ease; }
    .exam-block.collapsed .exam-block-body { max-height: 0 !important; }

    /* ── Badges ── */
    .badge {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .badge-violet { background: rgba(139,92,246,0.12); color: var(--violet); }
    .badge-emerald { background: rgba(16,185,129,0.12); color: var(--emerald); }
    .badge-rose { background: rgba(244,63,94,0.12); color: var(--rose); }

    .grade-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 12px; font-weight: 700;
    }
    .grade-Ap { background: rgba(16,185,129,0.15); color: #059669; }
    .grade-A  { background: rgba(16,185,129,0.12); color: var(--emerald); }
    .grade-B  { background: rgba(245,158,11,0.12); color: var(--amber); }
    .grade-C  { background: rgba(59,130,246,0.12); color: var(--blue); }
    .grade-D  { background: rgba(139,92,246,0.12); color: var(--violet); }
    .grade-F  { background: rgba(244,63,94,0.12); color: var(--rose); }

    .status-pass     { color: var(--emerald); font-weight: 600; font-size: 12px; }
    .status-moderate { color: var(--amber);   font-weight: 600; font-size: 12px; }
    .status-failed   { color: var(--rose);    font-weight: 600; font-size: 12px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; padding: 0 20px 16px; }
    .subjects-table { width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 12px; }
    .subjects-table th {
      background: #f8fafc; padding: 9px 12px; text-align: left;
      font-weight: 600; font-size: 12px; color: var(--text2);
      border-bottom: 2px solid var(--border2); white-space: nowrap;
    }
    .subjects-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .subjects-table tr:last-child td { border-bottom: none; }
    .subjects-table tr:hover td { background: #fafbfc; }
    .overall-row td { background: #f8fafc; font-weight: 700; border-top: 2px solid var(--border2); }

    /* ── Action Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 600; border: none; cursor: pointer;
      text-decoration: none; transition: opacity .15s; font-family: inherit;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-indigo  { background: var(--indigo); color: white; }
    .btn-outline { background: transparent; color: var(--indigo); border: 1.5px solid var(--indigo); }

    /* ── Verify Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: white; border-radius: 16px; max-width: 460px; width: 100%;
      overflow: hidden; transform: scale(0.95); transition: transform .2s;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal-header { padding: 22px 28px 16px; text-align: center; }
    .modal-header.valid   { background: linear-gradient(135deg,#10b981,#059669); color: white; }
    .modal-header.invalid { background: linear-gradient(135deg,#f43f5e,#dc2626); color: white; }
    .modal-header.loading { background: linear-gradient(135deg,#6366f1,#4f46e5); color: white; }
    .modal-icon { font-size: 42px; margin-bottom: 6px; }
    .modal-header h2 { margin: 0; font-size: 19px; font-weight: 700; }
    .modal-header p { margin: 5px 0 0; opacity: 0.88; font-size: 13px; }
    .modal-body { padding: 18px 28px; }
    .detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #64748b; font-weight: 500; }
    .detail-value { color: #0f172a; font-weight: 600; text-align: right; }
    .id-chip { font-family: monospace; background: #f1f5f9; padding: 2px 7px; border-radius: 4px; font-size: 11px; }
    .modal-footer { padding: 12px 28px 20px; text-align: center; }
    .modal-close {
      padding: 9px 28px; border-radius: var(--radius-sm);
      background: #f1f5f9; color: var(--text2); font-size: 14px;
      font-weight: 600; border: none; cursor: pointer; font-family: inherit;
    }
    .modal-close:hover { background: #e2e8f0; }

    /* ── Skeleton / Empty ── */
    .skeleton {
      background: linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);
      background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: var(--radius);
    }
    @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-text">📚 School Portal</div>
      <div class="logo-sub">Student Dashboard</div>
    </div>
    <div class="nav-section">Main</div>
    <a class="nav-item" href="/student-portal"><span class="icon">🏠</span> Home</a>
    <a class="nav-item" href="/portal-home-schedule"><span class="icon">📖</span> Homework</a>
    <a class="nav-item" href="/portal-test-schedule"><span class="icon">📝</span> Tests</a>
    <a class="nav-item" href="/portal-exam-schedule"><span class="icon">🗓️</span> Exams</a>
    <div class="nav-section">Results</div>
    <a class="nav-item" href="/homework-results"><span class="icon">✅</span> Homework Results</a>
    <a class="nav-item" href="/class-test-results"><span class="icon">📊</span> Test Results</a>
    <a class="nav-item" href="/exam-results"><span class="icon">🎯</span> Exam Results</a>
    <a class="nav-item active" href="/term-exam-results"><span class="icon">🏆</span> Term Reports</a>
    <div class="nav-section">Account</div>
    <a class="nav-item" href="/student-billing"><span class="icon">💳</span> Billing</a>
    <a class="nav-item" href="/student-profile"><span class="icon">👤</span> Profile</a>
    <a class="nav-item" href="/portal-login?action=logout"><span class="icon">🚪</span> Logout</a>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="page-title">🏆 Term Exam Results</div>
    </header>
    <div class="content">

      <!-- Term filter tabs -->
      <div class="filter-bar" id="filterBar">
        <span class="filter-label">Term:</span>
        <div class="skeleton" style="height:32px;width:200px;border-radius:20px"></div>
      </div>

      <!-- Results -->
      <div id="resultsContainer">
        <div class="skeleton" style="height:260px;margin-bottom:16px"></div>
        <div class="skeleton" style="height:260px"></div>
      </div>

    </div>
  </div>

  <!-- Verify Modal -->
  <div class="modal-overlay" id="verifyOverlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header loading" id="modalHeader">
        <div class="modal-icon" id="modalIcon">⏳</div>
        <h2 id="modalTitle">Verifying…</h2>
        <p id="modalSubtitle">Please wait</p>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="modal-close" onclick="document.getElementById('verifyOverlay').classList.remove('open')">Close</button>
      </div>
    </div>
  </div>

  <script>
    let allData = null;
    let activeTermFilter = 'all';

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    function gradeClass(g) {
      const map = {'A+':'Ap','A':'A','B':'B','C':'C','D':'D','F':'F'};
      return 'grade-' + (map[g] || (g ? g.charAt(0) : 'F'));
    }

    function statusClass(s) {
      if (!s) return '';
      const l = s.toLowerCase();
      if (l === 'pass') return 'status-pass';
      if (l === 'moderate') return 'status-moderate';
      if (l === 'failed') return 'status-failed';
      return '';
    }

    // ── Term filter ──────────────────────────────────────────────────
    function buildFilterBar(terms) {
      const bar = document.getElementById('filterBar');
      const allTermNames = terms.map(t => t.term);
      bar.innerHTML = `<span class="filter-label">Term:</span>`;

      // "All" button
      const allBtn = document.createElement('button');
      allBtn.className = 'term-btn active';
      allBtn.textContent = 'All Terms';
      allBtn.onclick = () => setFilter('all', allBtn);
      bar.appendChild(allBtn);

      allTermNames.forEach(term => {
        const btn = document.createElement('button');
        btn.className = 'term-btn';
        btn.textContent = term;
        btn.onclick = () => setFilter(term, btn);
        bar.appendChild(btn);
      });
    }

    function setFilter(term, btn) {
      activeTermFilter = term;
      document.querySelectorAll('.term-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderResults(allData);
    }

    // ── Render ───────────────────────────────────────────────────────
    function renderResults(data) {
      const container = document.getElementById('resultsContainer');
      const terms = data.terms || [];
      const studentId = data.student_id;

      const filtered = activeTermFilter === 'all'
        ? terms
        : terms.filter(t => t.term === activeTermFilter);

      if (!filtered.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="emoji">📭</div>
            <p>No exam results found${activeTermFilter !== 'all' ? ' for ' + activeTermFilter : ''}.</p>
          </div>`;
        return;
      }

      container.innerHTML = '';

      filtered.forEach(termData => {
        const termSection = document.createElement('div');
        termSection.className = 'term-section';
        termSection.dataset.term = termData.term;

        const totalExams = termData.exams.length;
        termSection.innerHTML = `
          <div class="term-heading">
            <h2>${termData.term}</h2>
            <span class="term-pill">${totalExams} Exam${totalExams !== 1 ? 's' : ''}</span>
          </div>`;

        termData.exams.forEach(examData => {
          const overallPct = examData.overall_percentage;
          const overallBadgeClass = (overallPct !== null && overallPct >= 50) ? 'badge-emerald' : (overallPct !== null ? 'badge-rose' : 'badge-violet');
          const overallPctDisplay = overallPct !== null ? overallPct.toFixed(1) + '%' : (examData.subjects_marked + '/' + examData.subjects_total + ' marked');
          const block = document.createElement('div');
          block.className = 'exam-block';

          const subjectRows = examData.subjects.map(s => {
            const marksDisplay = (s.marks_obtained !== '' && s.marks_obtained !== null) ? s.marks_obtained : '—';
            const pctDisplay   = (s.percentage !== null && s.percentage !== undefined) ? s.percentage.toFixed(1) + '%' : '—';
            const gradeDisplay = s.grade ? `<span class="grade-badge ${gradeClass(s.grade)}">${s.grade}</span>` : '—';
            const statusDisplay= s.status ? `<span class="${statusClass(s.status)}">${s.status}</span>` : '—';
            return `
            <tr>
              <td>${s.subject || ''}</td>
              <td style="text-align:center">${s.date || ''}</td>
              <td style="text-align:center">${marksDisplay}</td>
              <td style="text-align:center">${s.max_marks || '—'}</td>
              <td style="text-align:center">${pctDisplay}</td>
              <td style="text-align:center">${gradeDisplay}</td>
              <td style="text-align:center">${statusDisplay}</td>
              <td style="text-align:center">
                <button class="btn btn-outline" style="padding:4px 10px;font-size:11px"
                  onclick="verifySchedule('${s.schedule}')">🔍 Verify</button>
              </td>
            </tr>`;
          }).join('');

          block.innerHTML = `
            <div class="exam-block-header" onclick="toggleExam(this)">
              <div>
                <div class="exam-name">${examData.exam}</div>
                <div class="exam-meta">${examData.subjects.length} subject${examData.subjects.length !== 1 ? 's' : ''}</div>
              </div>
              <div class="exam-right">
                <span class="badge ${overallBadgeClass}">
                  Overall: ${overallPctDisplay}
                </span>
                <button class="btn btn-indigo" style="font-size:12px"
                  onclick="event.stopPropagation();downloadExamPDF(this,'${examData.exam}','${termData.term}','${studentId}',${JSON.stringify(examData).replace(/'/g,"&#39;")})">
                  ⬇️ PDF
                </button>
                <span class="chevron">▾</span>
              </div>
            </div>
            <div class="exam-block-body">
              <div class="table-wrap">
                <table class="subjects-table">
                  <thead>
                    <tr>
                      <th>Subject</th>
                      <th style="text-align:center">Date</th>
                      <th style="text-align:center">Marks</th>
                      <th style="text-align:center">Max</th>
                      <th style="text-align:center">%</th>
                      <th style="text-align:center">Grade</th>
                      <th style="text-align:center">Status</th>
                      <th style="text-align:center">Verify</th>
                    </tr>
                  </thead>
                  <tbody>${subjectRows}</tbody>
                  <tfoot>
                    <tr class="overall-row">
                      <td colspan="2">OVERALL TOTAL</td>
                      <td style="text-align:center">${examData.total_obtained}</td>
                      <td style="text-align:center">${examData.total_max}</td>
                      <td style="text-align:center">${overallPct !== null ? overallPct.toFixed(1) + '%' : '—'}</td>
                      <td style="text-align:center">—</td>
                      <td></td><td></td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            </div>`;

          // Set initial max-height for animation
          block.querySelector('.exam-block-body').style.maxHeight = '2000px';
          termSection.appendChild(block);
        });

        container.appendChild(termSection);
      });
    }

    // ── Collapse/expand exam block ───────────────────────────────────
    function toggleExam(header) {
      const block = header.closest('.exam-block');
      const body = block.querySelector('.exam-block-body');
      if (block.classList.contains('collapsed')) {
        block.classList.remove('collapsed');
        body.style.maxHeight = '2000px';
      } else {
        block.classList.add('collapsed');
        body.style.maxHeight = '0';
      }
    }

    // ── Verify exam schedule (by schedule name) ──────────────────────
    function verifySchedule(scheduleName) {
      openModal();
      fetch(`/api/method/school.school_management.doctype.term_exam_report.term_exam_report.verify_exam_schedule?schedule=${encodeURIComponent(scheduleName)}`)
        .then(r => r.json())
        .then(res => showVerifyResult(res.message || res))
        .catch(() => showVerifyError());
    }

    function openModal() {
      document.getElementById('modalHeader').className = 'modal-header loading';
      document.getElementById('modalIcon').textContent = '⏳';
      document.getElementById('modalTitle').textContent = 'Verifying…';
      document.getElementById('modalSubtitle').textContent = 'Please wait';
      document.getElementById('modalBody').innerHTML = '';
      document.getElementById('verifyOverlay').classList.add('open');
    }

    function showVerifyResult(d) {
      const header = document.getElementById('modalHeader');
      if (d.valid) {
        header.className = 'modal-header valid';
        document.getElementById('modalIcon').textContent = '✅';
        document.getElementById('modalTitle').textContent = 'Verified';
        document.getElementById('modalSubtitle').textContent = 'This is an official exam record.';
        document.getElementById('modalBody').innerHTML = `
          <div class="detail-row"><span class="detail-label">Exam</span><span class="detail-value">${d.exam}</span></div>
          <div class="detail-row"><span class="detail-label">Subject</span><span class="detail-value">${d.subject}</span></div>
          <div class="detail-row"><span class="detail-label">Term</span><span class="detail-value">${d.term}</span></div>
          <div class="detail-row"><span class="detail-label">Class</span><span class="detail-value">${d.student_class}${d.section ? ' — ' + d.section : ''}</span></div>
          <div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">${d.date}</span></div>
          <div class="detail-row"><span class="detail-label">Max Marks</span><span class="detail-value">${d.max_marks}</span></div>
          <div class="detail-row"><span class="detail-label">Schedule ID</span><span class="detail-value"><span class="id-chip">${d.schedule}</span></span></div>`;
      } else {
        header.className = 'modal-header invalid';
        document.getElementById('modalIcon').textContent = '❌';
        document.getElementById('modalTitle').textContent = 'Verification Failed';
        document.getElementById('modalSubtitle').textContent = d.message || 'Could not verify this record.';
        document.getElementById('modalBody').innerHTML = `<p style="text-align:center;color:#64748b;font-size:13px;padding:12px 0">Contact the school if you believe this is an error.</p>`;
      }
    }

    function showVerifyError() {
      document.getElementById('modalHeader').className = 'modal-header invalid';
      document.getElementById('modalIcon').textContent = '⚠️';
      document.getElementById('modalTitle').textContent = 'Connection Error';
      document.getElementById('modalSubtitle').textContent = 'Could not reach the server.';
    }

    function closeModal(e) {
      if (e && e.target !== document.getElementById('verifyOverlay')) return;
      document.getElementById('verifyOverlay').classList.remove('open');
    }

    // ── Check for ?report= in URL (QR scan) ─────────────────────────
    function checkQRParam() {
      const report = new URLSearchParams(window.location.search).get('report');
      if (report) setTimeout(() => { openModal(); verifySchedule(report); }, 500);
    }

    // ── Download PDF for one exam ────────────────────────────────────
    function downloadExamPDF(btn, examName, term, studentId, examData) {
      btn.disabled = true;
      btn.textContent = '⏳';
      fetch('/api/method/school.school_management.doctype.term_exam_report.term_exam_report.get_exam_pdf', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Frappe-CSRF-Token': (document.cookie.match(/csrf_token=([^;]+)/) || [])[1] || ''
        },
        body: JSON.stringify({ exam: examName, term: term, student_id: studentId, exam_data: examData })
      })
      .then(r => { if (!r.ok) throw new Error(); return r.blob(); })
      .then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `${examName}_${term}_Results.pdf`.replace(/\s+/g,'_');
        a.click();
        btn.disabled = false;
        btn.innerHTML = '⬇️ PDF';
      })
      .catch(() => {
        alert('Could not generate PDF. Please try again.');
        btn.disabled = false;
        btn.innerHTML = '⬇️ PDF';
      });
    }

    // ── Load data ────────────────────────────────────────────────────
    fetch('/term-exam-results?format=json')
      .then(r => r.json())
      .then(data => {
        allData = data;
        if (!data.terms || !data.terms.length) {
          document.getElementById('filterBar').innerHTML = '';
          document.getElementById('resultsContainer').innerHTML = `
            <div class="empty-state"><div class="emoji">📭</div><p>No exam results found yet.</p></div>`;
          return;
        }
        buildFilterBar(data.terms);
        renderResults(data);
        checkQRParam();
      })
      .catch(() => {
        document.getElementById('resultsContainer').innerHTML = `
          <div class="empty-state"><div class="emoji">⚠️</div><p>Could not load results. Please refresh.</p></div>`;
      });
  </script>
</body>
</html>
