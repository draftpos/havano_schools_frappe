<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Term Exam Results | Student Portal</title>
    <!-- Include Frappe desk styles and Bootstrap -->
    <link href="/assets/frappe/css/frappe-web.css" rel="stylesheet">
    <script src="/assets/frappe/js/lib/jquery/jquery.min.js"></script>
    <script src="/assets/frappe/js/frappe-web.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
        .portal-header {
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-content h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
        }
        .btn-back {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            color: white;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .filters select {
            flex: 1;
            padding: 0.75rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 1rem;
            background-color: #f9fafb;
            color: var(--text-main);
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 1.2rem;
            display: none;
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .results-table th, .results-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .results-table th {
            background-color: #f9fafb;
            font-weight: 600;
            color: var(--text-muted);
        }
        .results-table tr:hover td {
            background-color: #f3f4f6;
        }
        .grade-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
        }
        .grade-a { background-color: #dcfce7; color: #166534; }
        .grade-b { background-color: #e0f2fe; color: #075985; }
        .grade-c { background-color: #fef9c3; color: #854d0e; }
        .grade-d { background-color: #ffedd5; color: #9a3412; }
        .grade-f { background-color: #fee2e2; color: #991b1b; }
        
        /* Global Card Text Color Hover */
        .card *, .module-card *, .reg-card *, .stat-card *, .reg-card-header *, .card-title, .status-value, .stat-value {
            transition: color 0.3s ease;
        }
        .card:hover *, .module-card:hover *, .reg-card:hover *, .stat-card:hover *, .reg-card-header:hover * {
            color: var(--primary) !important;
        }
    </style>
</head>
<body>

<div class="portal-header">
    <div class="container header-content">
        <h1>Term Exam Results</h1>
        <a href="/assets/school/html/student-portal.html" class="btn-back">← Back to Portal</a>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="filters">
            <select id="academic-term" title="Select Academic Term">
                <option value="">Select Term</option>
            </select>
            <select id="exam-group" title="Select Exam Group">
                <option value="">Select Exam</option>
            </select>
        </div>

        <div id="loading" class="loading">
            Loading your results...
        </div>

        <div id="results-container" style="display: none;">
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Subject</th>
                        <th>Maximum Marks</th>
                        <th>Marks Obtained</th>
                        <th>Grade</th>
                    </tr>
                </thead>
                <tbody id="results-body">
                    <!-- Results populated via JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    frappe.ready(function() {
        if(frappe.session.user === "Guest") {
            window.location.href = "/portal-login";
            return;
        }
        
        loadFilters();

        $('#academic-term, #exam-group').on('change', function() {
            fetchResults();
        });
    });

    function loadFilters() {
        // Fetch valid terms and exams for the student
        frappe.call({
            method: 'frappe.client.get_list',
            args: {
                doctype: 'Academic Term',
                fields: ['name', 'term_name']
            },
            callback: function(r) {
                if (r.message) {
                    let termSelect = $('#academic-term');
                    termSelect.empty().append('<option value="">Select Academic Term</option>');
                    r.message.forEach(term => {
                        termSelect.append(`<option value="${term.name}">${term.term_name || term.name}</option>`);
                    });
                }
            }
        });

        frappe.call({
            method: 'frappe.client.get_list',
            args: {
                doctype: 'Exam Group',
                fields: ['name']
            },
            callback: function(r) {
                if (r.message) {
                    let examSelect = $('#exam-group');
                    examSelect.empty().append('<option value="">Select Exam</option>');
                    r.message.forEach(exam => {
                        examSelect.append(`<option value="${exam.name}">${exam.name}</option>`);
                    });
                }
            }
        });
    }

    function fetchResults() {
        let term = $('#academic-term').val();
        let exam = $('#exam-group').val();

        if(!term || !exam) {
            $('#results-container').hide();
            return;
        }

        $('#loading').show();
        $('#results-container').hide();

        // First find the Student id linked to current user
        frappe.call({
            method: 'frappe.client.get_value',
            args: {
                doctype: 'Student',
                filters: { 'portal_email': frappe.session.user },
                fieldname: 'name'
            },
            callback: function(r) {
                if (r.message && r.message.name) {
                    let student = r.message.name;
                    getExamResults(student, term, exam);
                } else {
                    $('#loading').html('Student record not found associated with your account.');
                }
            }
        });
    }

    function getExamResults(student, term, exam) {
        frappe.call({
            method: 'frappe.client.get_list',
            args: {
                doctype: 'Exam Result',
                filters: {
                    'student': student,
                    'academic_term': term,
                    'exam_group': exam,
                    'docstatus': 1
                },
                fields: ['name']
            },
            callback: function(r) {
                if (r.message && r.message.length > 0) {
                    let result_id = r.message[0].name;
                    getExamDetails(result_id);
                } else {
                    $('#loading').html('No results found for the selected term and exam.');
                }
            }
        });
    }

    function getExamDetails(result_id) {
        frappe.call({
            method: 'frappe.client.get',
            args: {
                doctype: 'Exam Result',
                name: result_id
            },
            callback: function(r) {
                $('#loading').hide();
                if (r.message && r.message.details) {
                    populateTable(r.message.details);
                    $('#results-container').show();
                } else {
                    $('#loading').html('No detailed marks found in this result.').show();
                }
            }
        });
    }

    function populateTable(details) {
        let body = $('#results-body');
        body.empty();

        details.forEach(row => {
            let gradeClass = '';
            let grade = (row.grade || '').toUpperCase();
            if(grade.startsWith('A')) gradeClass = 'grade-a';
            else if(grade.startsWith('B')) gradeClass = 'grade-b';
            else if(grade.startsWith('C')) gradeClass = 'grade-c';
            else if(grade.startsWith('D')) gradeClass = 'grade-d';
            else if(grade.startsWith('F')) gradeClass = 'grade-f';

            let tr = `<tr>
                <td><strong>${row.subject || '-'}</strong></td>
                <td>${row.maximum_marks || 100}</td>
                <td>${row.marks || 0}</td>
                <td><span class="grade-badge ${gradeClass}">${row.grade || '-'}</span></td>
            </tr>`;
            body.append(tr);
        });
    }
</script>

</body>
</html>
