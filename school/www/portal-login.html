---
no_cache: 1
title: Student Portal Login
---
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: Arial, sans-serif; }
        .login-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .login-card h2 { color: #1e3a5f; font-weight: 700; margin-bottom: 8px; }
        .login-card p { color: #888; margin-bottom: 24px; }
        .form-control { border-radius: 8px; padding: 12px 16px; border: 1px solid #e0e0e0; }
        .form-control:focus { border-color: #2e86de; box-shadow: 0 0 0 3px rgba(46,134,222,0.1); }
        .btn-login { background: #2e86de; color: white; border-radius: 8px; padding: 12px; font-size: 1rem; font-weight: 600; border: none; width: 100%; }
        .btn-login:hover { background: #1a6abf; color: white; }
        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: #2e86de; text-decoration: none; font-size: 0.9rem; }
        .error-msg { background: #fce8e6; color: #e53935; border-radius: 8px; padding: 12px; margin-bottom: 16px; display: none; }
        .logo-circle { width: 70px; height: 70px; background: linear-gradient(135deg, #1e3a5f, #2e86de); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-circle">
            <i class="fa fa-graduation-cap fa-2x text-white"></i>
        </div>
        <h2 class="text-center">Hellena School</h2>
        <p class="text-center">Enter your credentials to access your portal</p>

        <div class="error-msg" id="error-msg"></div>

        <div class="mb-3">
            <label class="form-label" style="font-weight:600;color:#333;">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="Enter your email">
        </div>
        <div class="mb-4">
            <label class="form-label" style="font-weight:600;color:#333;">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter your password">
        </div>
        <button class="btn-login" onclick="doLogin()">
            <i class="fa fa-sign-in-alt me-2"></i> Login
        </button>

        <div class="back-link">
            <a href="/"><i class="fa fa-arrow-left me-1"></i> Back to Home</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script>
        // If already logged in as student, redirect to portal
        $.ajax({
            url: '/api/method/frappe.auth.get_logged_user',
            success: function(r) {
                if (r.message && r.message !== 'Guest') {
                    $.ajax({
                        url: '/api/method/frappe.client.get_list',
                        data: {
                            doctype: 'Has Role',
                            filters: JSON.stringify([['parent', '=', r.message], ['role', '=', 'Student Portal']]),
                            fields: JSON.stringify(['name']),
                            limit: 1
                        },
                        success: function(res) {
                            if (res.message && res.message.length > 0) {
                                window.location = '/student-portal';
                            }
                        }
                    });
                }
            }
        });

        function doLogin() {
            var email = $('#email').val().trim();
            var password = $('#password').val();

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            $('#error-msg').hide();

            $.ajax({
                url: '/api/method/login',
                type: 'POST',
                data: { usr: email, pwd: password },
                success: function(r) {
                    // After login check roles via session
                    $.ajax({
                        url: '/api/method/frappe.client.get_list',
                        type: 'GET',
                        data: {
                            doctype: 'Has Role',
                            filters: JSON.stringify([['parent', '=', email], ['role', '=', 'Student Portal']]),
                            fields: JSON.stringify(['name']),
                            limit: 1,
                            ignore_permissions: 1
                        },
                        success: function(res) {
                            if (res.message && res.message.length > 0) {
                                window.location = '/student-portal';
                            } else {
                                window.location = '/app';
                            }
                        },
                        error: function() {
                            window.location = '/app';
                        }
                    });
                },
                error: function(r) {
                    var msg = 'Invalid email or password.';
                    try {
                        var resp = JSON.parse(r.responseText);
                        if (resp._server_messages) {
                            var msgs = JSON.parse(resp._server_messages);
                            msg = JSON.parse(msgs[0]).message;
                        }
                    } catch(e) {}
                    showError(msg);
                }
            });
        }

        function showError(msg) {
            $('#error-msg').text(msg).show();
        }

        $('#password').keypress(function(e) {
            if (e.which === 13) doLogin();
        });
    </script>
</body>
</html>
