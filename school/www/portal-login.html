no_cache: 1
title: School Portal Login
---
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Portal Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
        .login-card{background:#ffffff;border:1px solid #e2e8f0;border-radius:24px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,0.08);position:relative;z-index:1;animation:fadeInUp 0.6s ease both;}
        .logo-wrap{text-align:center;margin-bottom:28px;}
        .logo-circle{width:72px;height:72px;background:linear-gradient(135deg,#2e86de,#1e3a5f);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(46,134,222,0.4);margin-bottom:16px;}
        .logo-wrap h2{color:#0f172a;font-size:22px;font-weight:700;margin-bottom:6px;}
        .logo-wrap p{color:#64748b;font-size:13.5px;}
        .field-label{display:block;font-size:12px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:#64748b;margin-bottom:8px;}
        .input-wrap{position:relative;margin-bottom:18px;}
        .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#3b82f6;font-size:14px;pointer-events:none;}
        .form-control{background:#f8fafc!important;border:1px solid #e2e8f0!important;border-radius:12px!important;padding:13px 42px 13px 40px!important;color:#0f172a!important;font-size:14px!important;width:100%;transition:all 0.2s!important;}
        .form-control::placeholder{color:#94a3b8!important;}
        .form-control:focus{outline:none!important;border-color:rgba(46,134,222,0.6)!important;background:rgba(46,134,222,0.08)!important;box-shadow:0 0 0 3px rgba(46,134,222,0.15)!important;}
        .eye-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#3b82f6;cursor:pointer;font-size:15px;z-index:2;}
        .input-wrap.has-error .form-control{border-color:rgba(239,68,68,0.6)!important;background:rgba(239,68,68,0.06)!important;}
        .alert-msg{border-radius:12px;padding:12px 16px;font-size:13px;font-weight:500;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
        .alert-msg.hidden{display:none!important;}
        .alert-error{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);color:#fca5a5;}
        .alert-success{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.25);color:#6ee7b7;}
        .alert-info{background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);color:#93c5fd;}
        .btn-login{background:linear-gradient(135deg,#2e86de,#1a5fa8);color:white;border-radius:12px;padding:14px;font-size:14px;font-weight:700;border:none;width:100%;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(46,134,222,0.35);}
        .btn-login:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px rgba(46,134,222,0.45);}
        .btn-login:disabled{opacity:0.7;cursor:not-allowed;}
        .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
        .shake{animation:shake 0.4s ease both;}
        .back-link{text-align:center;margin-top:20px;}
        .back-link a{color:#64748b;text-decoration:none;font-size:12.5px;display:inline-flex;align-items:center;gap:6px;}
        .back-link a:hover{color:#1e3a5f;}
    </style>
</head>
<body>
    <div class="login-card" id="login-card">
        <div class="logo-wrap">
            <div class="logo-circle"><i class="fa fa-graduation-cap fa-2x text-white"></i></div>
            <h2>School Portal</h2>
            <p>Enter your credentials to continue</p>
        </div>
        <div class="alert-msg alert-error hidden" id="msg-error"><i class="fa fa-exclamation-circle"></i><span id="msg-error-text">Invalid email or password.</span></div>
        <div class="alert-msg alert-success hidden" id="msg-success"><i class="fa fa-check-circle"></i><span id="msg-success-text">Login successful! Redirecting…</span></div>
        <div class="alert-msg alert-info hidden" id="msg-info"><i class="fa fa-info-circle"></i><span id="msg-info-text">Checking your session…</span></div>
        <div class="mb-1"><label class="field-label">Email Address</label></div>
        <div class="input-wrap" id="wrap-email">
            <i class="fa fa-envelope input-icon"></i>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="mb-1"><label class="field-label">Password</label></div>
        <div class="input-wrap" id="wrap-password">
            <i class="fa fa-lock input-icon"></i>
            <input type="password" class="form-control" id="password" placeholder="Enter your password" autocomplete="current-password"/>
            <button class="eye-toggle" type="button" onclick="togglePassword()" tabindex="-1"><i class="fa fa-eye" id="eye-icon"></i></button>
        </div>
        <button class="btn-login" id="btn-login" onclick="doLogin()">
            <div class="spinner" id="spinner"></div>
            <i class="fa fa-sign-in-alt" id="btn-icon"></i>
            <span id="btn-text">Login</span>
        </button>
        <div class="back-link"><a href="/"><i class="fa fa-arrow-left"></i> Back to Home</a></div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script>
        function togglePassword(){var i=document.getElementById('password'),e=document.getElementById('eye-icon');i.type=i.type==='password'?'text':'password';e.className=i.type==='text'?'fa fa-eye-slash':'fa fa-eye';}
        function showMsg(t,x){['error','success','info'].forEach(function(n){document.getElementById('msg-'+n).classList.add('hidden');});if(!t)return;var e=document.getElementById('msg-'+t);if(x)document.getElementById('msg-'+t+'-text').textContent=x;e.classList.remove('hidden');}
        function setLoading(on){document.getElementById('spinner').style.display=on?'block':'none';document.getElementById('btn-icon').style.display=on?'none':'inline';document.getElementById('btn-text').textContent=on?'Logging in…':'Login';document.getElementById('btn-login').disabled=on;}
        function shakeCard(){var c=document.getElementById('login-card');c.classList.remove('shake');void c.offsetWidth;c.classList.add('shake');}
        function validate(){var e=document.getElementById('email').value.trim(),p=document.getElementById('password').value,ok=true;document.getElementById('wrap-email').classList.remove('has-error');document.getElementById('wrap-password').classList.remove('has-error');if(!e){document.getElementById('wrap-email').classList.add('has-error');ok=false;}if(!p){document.getElementById('wrap-password').classList.add('has-error');ok=false;}return ok;}

        function redirectByRole(email){
            $.ajax({
                url:'/api/method/school.api.get_user_redirect',
                type:'GET',
                success:function(r){
                    if(r.message&&r.message.redirect){
                        if(r.message.role==='admin'||r.message.role==='school_user'){
                            showMsg('success','Welcome! Loading admin dashboard…');
                        } else {
                            showMsg('success','Welcome! Loading your student portal…');
                        }
                        setTimeout(function(){window.location=r.message.redirect;},900);
                    } else {
                        setTimeout(function(){window.location='/assets/school/html/student-portal.html';},900);
                    }
                },
                error:function(){setTimeout(function(){window.location='/assets/school/html/student-portal.html';},900);}
            });
        }

        function doLogin(){
            ['error','success','info'].forEach(function(t){document.getElementById('msg-'+t).classList.add('hidden');});
            if(!validate()){showMsg('error','Please fill in all fields.');shakeCard();return;}
            var email=document.getElementById('email').value.trim(),password=document.getElementById('password').value;
            setLoading(true);showMsg('info','Verifying your credentials…');
            $.ajax({
                url:'/api/method/login',type:'POST',data:{usr:email,pwd:password},
                success:function(){showMsg('info','Checking your account…');redirectByRole(email);},
                error:function(r){
                    setLoading(false);
                    var msg='Invalid email or password.';
                    try{var resp=JSON.parse(r.responseText);if(resp._server_messages){var m=JSON.parse(resp._server_messages);var p=JSON.parse(m[0]);if(p.message)msg=p.message;}}catch(e){}
                    showMsg('error',msg);shakeCard();
                    document.getElementById('wrap-email').classList.add('has-error');
                    document.getElementById('wrap-password').classList.add('has-error');
                }
            });
        }

        document.getElementById('password').addEventListener('keypress',function(e){if(e.which===13)doLogin();});
        document.getElementById('email').addEventListener('keypress',function(e){if(e.which===13)document.getElementById('password').focus();});
        document.getElementById('email').addEventListener('input',function(){document.getElementById('wrap-email').classList.remove('has-error');});
        document.getElementById('password').addEventListener('input',function(){document.getElementById('wrap-password').classList.remove('has-error');});

        // Only auto-redirect if user came from another page (not a fresh login page visit)
        if (document.referrer && !document.referrer.includes('/portal-login')) {
            $.ajax({url:'/api/method/frappe.auth.get_logged_user',success:function(r){
                if(r.message&&r.message!=='Guest'){
                    showMsg('info','Already logged in, redirecting…');
                    redirectByRole(r.message);
                }
            }});
        }
    </script>
</body>
</html>
