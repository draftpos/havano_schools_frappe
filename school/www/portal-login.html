---
no_cache: 1
title: Student Portal Login
---
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, #0f1c2e 0%, #1a2f4a 50%, #0d2137 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Arial, sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Animated background blobs */
        body::before {
            content: '';
            position: fixed;
            top: -100px; left: -100px;
            width: 400px; height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(46,134,222,0.15) 0%, transparent 70%);
            animation: float 8s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -100px; right: -100px;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(30,58,95,0.3) 0%, transparent 70%);
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); max-height: 0; }
            to { opacity: 1; transform: translateY(0); max-height: 100px; }
        }

        .login-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease both;
        }

        /* Logo */
        .logo-wrap {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-circle {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #2e86de, #1e3a5f);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(46,134,222,0.4);
            margin-bottom: 16px;
            position: relative;
        }
        .logo-circle::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            border: 1px solid rgba(46,134,222,0.4);
        }

        .logo-wrap h2 {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }
        .logo-wrap p {
            color: rgba(255,255,255,0.45);
            font-size: 13.5px;
        }

        /* Form labels */
        .field-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        /* Input wrapper */
        .input-wrap {
            position: relative;
            margin-bottom: 18px;
        }

        .input-wrap .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 14px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .form-control {
            background: rgba(255,255,255,0.06) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            border-radius: 12px !important;
            padding: 13px 42px 13px 40px !important;
            color: #ffffff !important;
            font-size: 14px !important;
            width: 100%;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s !important;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.2) !important; }
        .form-control:focus {
            outline: none !important;
            border-color: rgba(46,134,222,0.6) !important;
            background: rgba(46,134,222,0.08) !important;
            box-shadow: 0 0 0 3px rgba(46,134,222,0.15) !important;
        }
        .form-control:focus ~ .input-icon { color: #2e86de; }

        /* Eye toggle */
        .eye-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            padding: 4px;
            font-size: 15px;
            transition: color 0.2s;
            z-index: 2;
        }
        .eye-toggle:hover { color: rgba(255,255,255,0.7); }

        /* Input valid/invalid states */
        .input-wrap.has-error .form-control {
            border-color: rgba(239,68,68,0.6) !important;
            background: rgba(239,68,68,0.06) !important;
        }
        .input-wrap.has-success .form-control {
            border-color: rgba(16,185,129,0.5) !important;
        }

        /* Alert messages */
        .alert-msg {
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            margin-bottom: 18px;
            animation: slideDown 0.3s ease both;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-msg.hidden { display: none !important; }

        .alert-error {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.25);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(16,185,129,0.12);
            border: 1px solid rgba(16,185,129,0.25);
            color: #6ee7b7;
        }
        .alert-info {
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.25);
            color: #93c5fd;
        }

        /* Login button */
        .btn-login {
            background: linear-gradient(135deg, #2e86de, #1a5fa8);
            color: white;
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            border: none;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 16px rgba(46,134,222,0.35);
            position: relative;
            overflow: hidden;
        }
        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .btn-login:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(46,134,222,0.45);
        }
        .btn-login:hover::before { opacity: 1; }
        .btn-login:active:not(:disabled) { transform: translateY(0); }
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        /* Shake animation for card on error */
        .shake { animation: shake 0.4s ease both; }

        /* Divider */
        .divider {
            text-align: center;
            margin: 20px 0 16px;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }
        .divider span {
            background: transparent;
            color: rgba(255,255,255,0.25);
            font-size: 11px;
            padding: 0 12px;
            position: relative;
        }

        /* Back link */
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: rgba(255,255,255,0.35);
            text-decoration: none;
            font-size: 12.5px;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .back-link a:hover { color: rgba(255,255,255,0.65); }

        /* Success checkmark */
        .success-check {
            width: 20px; height: 20px;
            background: var(--emerald, #10b981);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="login-card" id="login-card">

        <div class="logo-wrap">
            <div class="logo-circle">
                <i class="fa fa-graduation-cap fa-2x text-white"></i>
            </div>
            <h2>ELearning</h2>
            <p>Enter your credentials to access your portal</p>
        </div>

        <!-- Alert messages -->
        <div class="alert-msg alert-error hidden" id="msg-error">
            <i class="fa fa-exclamation-circle"></i>
            <span id="msg-error-text">Invalid email or password.</span>
        </div>
        <div class="alert-msg alert-success hidden" id="msg-success">
            <i class="fa fa-check-circle"></i>
            <span id="msg-success-text">Login successful! Redirecting…</span>
        </div>
        <div class="alert-msg alert-info hidden" id="msg-info">
            <i class="fa fa-info-circle"></i>
            <span id="msg-info-text">Checking your session…</span>
        </div>

        <!-- Email -->
        <div class="mb-1">
            <label class="field-label">Email Address</label>
        </div>
        <div class="input-wrap" id="wrap-email">
            <i class="fa fa-envelope input-icon"></i>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" autocomplete="email" />
        </div>

        <!-- Password -->
        <div class="mb-1">
            <label class="field-label">Password</label>
        </div>
        <div class="input-wrap" id="wrap-password">
            <i class="fa fa-lock input-icon"></i>
            <input type="password" class="form-control" id="password" placeholder="Enter your password" autocomplete="current-password" />
            <button class="eye-toggle" id="eye-toggle" type="button" onclick="togglePassword()" tabindex="-1" title="Show/hide password">
                <i class="fa fa-eye" id="eye-icon"></i>
            </button>
        </div>

        <!-- Login Button -->
        <button class="btn-login" id="btn-login" onclick="doLogin()">
            <div class="spinner" id="spinner"></div>
            <i class="fa fa-sign-in-alt" id="btn-icon"></i>
            <span id="btn-text">Login</span>
        </button>

        <div class="back-link">
            <a href="/"><i class="fa fa-arrow-left"></i> Back to Home</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script>
        /* ── SHOW/HIDE PASSWORD ── */
        function togglePassword() {
            var input = document.getElementById('password');
            var icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa fa-eye';
            }
        }

        /* ── MESSAGES ── */
        function showMsg(type, text) {
            // Hide all first
            ['error','success','info'].forEach(function(t) {
                document.getElementById('msg-' + t).classList.add('hidden');
            });
            if (!type) return;
            var el = document.getElementById('msg-' + type);
            var textEl = document.getElementById('msg-' + type + '-text');
            if (text) textEl.textContent = text;
            el.classList.remove('hidden');
        }

        function hideAllMsgs() {
            ['error','success','info'].forEach(function(t) {
                document.getElementById('msg-' + t).classList.add('hidden');
            });
        }

        /* ── LOADING STATE ── */
        function setLoading(loading) {
            var btn = document.getElementById('btn-login');
            var spinner = document.getElementById('spinner');
            var icon = document.getElementById('btn-icon');
            var text = document.getElementById('btn-text');

            if (loading) {
                btn.disabled = true;
                spinner.style.display = 'block';
                icon.style.display = 'none';
                text.textContent = 'Logging in…';
            } else {
                btn.disabled = false;
                spinner.style.display = 'none';
                icon.style.display = 'inline';
                text.textContent = 'Login';
            }
        }

        /* ── SHAKE CARD ── */
        function shakeCard() {
            var card = document.getElementById('login-card');
            card.classList.remove('shake');
            void card.offsetWidth; // reflow
            card.classList.add('shake');
            setTimeout(function() { card.classList.remove('shake'); }, 500);
        }

        /* ── VALIDATE INPUTS ── */
        function validateInputs() {
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var valid = true;

            document.getElementById('wrap-email').classList.remove('has-error');
            document.getElementById('wrap-password').classList.remove('has-error');

            if (!email) {
                document.getElementById('wrap-email').classList.add('has-error');
                valid = false;
            }
            if (!password) {
                document.getElementById('wrap-password').classList.add('has-error');
                valid = false;
            }
            return valid;
        }

        /* ── MAIN LOGIN ── */
        function doLogin() {
            hideAllMsgs();
            if (!validateInputs()) {
                showMsg('error', 'Please fill in all fields.');
                shakeCard();
                return;
            }

            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            setLoading(true);
            showMsg('info', 'Verifying your credentials…');

            $.ajax({
                url: '/api/method/login',
                type: 'POST',
                data: { usr: email, pwd: password },
                success: function(r) {
                    showMsg('info', 'Checking your account role…');

                    // Check if student portal role
                    $.ajax({
                        url: '/api/method/frappe.client.get_list',
                        type: 'GET',
                        data: {
                            doctype: 'Has Role',
                            filters: JSON.stringify([['parent', '=', email], ['role', '=', 'Student Portal']]),
                            fields: JSON.stringify(['name']),
                            limit: 1,
                            ignore_permissions: 1
                        },
                        success: function(res) {
                            setLoading(false);
                            showMsg('success', 'Login successful! Redirecting you now…');
                            setTimeout(function() {
                                if (res.message && res.message.length > 0) {
                                    window.location = '/student-portal';
                                } else {
                                    window.location = '/app';
                                }
                            }, 1000);
                        },
                        error: function() {
                            setLoading(false);
                            showMsg('success', 'Login successful! Redirecting…');
                            setTimeout(function() { window.location = '/app'; }, 1000);
                        }
                    });
                },
                error: function(r) {
                    setLoading(false);
                    var msg = 'Invalid email or password. Please try again.';
                    try {
                        var resp = JSON.parse(r.responseText);
                        if (resp._server_messages) {
                            var msgs = JSON.parse(resp._server_messages);
                            var parsed = JSON.parse(msgs[0]);
                            if (parsed.message) msg = parsed.message;
                        }
                    } catch(e) {}
                    showMsg('error', msg);
                    shakeCard();
                    document.getElementById('wrap-email').classList.add('has-error');
                    document.getElementById('wrap-password').classList.add('has-error');
                }
            });
        }

        /* ── ENTER KEY ── */
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.which === 13) doLogin();
        });
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.which === 13) document.getElementById('password').focus();
        });

        /* ── CLEAR ERRORS ON INPUT ── */
        document.getElementById('email').addEventListener('input', function() {
            document.getElementById('wrap-email').classList.remove('has-error');
        });
        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('wrap-password').classList.remove('has-error');
        });

        /* ── AUTO-CHECK SESSION ── */
        $.ajax({
            url: '/api/method/frappe.auth.get_logged_user',
            success: function(r) {
                if (r.message && r.message !== 'Guest') {
                    $.ajax({
                        url: '/api/method/frappe.client.get_list',
                        data: {
                            doctype: 'Has Role',
                            filters: JSON.stringify([['parent', '=', r.message], ['role', '=', 'Student Portal']]),
                            fields: JSON.stringify(['name']),
                            limit: 1
                        },
                        success: function(res) {
                            if (res.message && res.message.length > 0) {
                                window.location = '/student-portal';
                            }
                        }
                    });
                }
            }
        });
    </script>
</body>
</html>
